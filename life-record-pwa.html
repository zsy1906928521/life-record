<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c1785e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Life日志">
<meta name="description" content="Life日志 — 记录你一生的故事">
<title>Life日志</title>
<link rel="icon" href="tubiao.jpg">
<link rel="apple-touch-icon" href="tubiao.jpg">
<link rel="manifest" href="manifest.json">
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #fdf6f0;
  --bg2: #f7ede2;
  --card: #fff;
  --card-hover: #fef9f4;
  --text: #3d2c2c;
  --text2: #7a6a6a;
  --text3: #b0a0a0;
  --accent: #c1785e;
  --accent2: #e09e7a;
  --accent-light: #fce8df;
  --timeline: #e0d0c0;
  --timeline-dot: #c1785e;
  --border: #e8ddd0;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --danger: #c0392b;
  --danger-bg: #fdecea;
  --tag-bg: #f0e6da;
  --tag-text: #8b6b4a;
  --modal-overlay: rgba(0,0,0,0.4);
  --input-bg: #fdf6f0;
  --input-border: #d4c8b8;
  --input-focus: #c1785e;
  --placeholder: #c0b0a0;
  --badge: #c1785e;
  --badge-text: #fff;
  transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
}

[data-theme="dark"] {
  --bg: #1a1a2e;
  --bg2: #222240;
  --card: #16213e;
  --card-hover: #1c2a4a;
  --text: #e0d6cc;
  --text2: #a09888;
  --text3: #706858;
  --accent: #e07a5f;
  --accent2: #f09878;
  --accent-light: #3a2020;
  --timeline: #3a3050;
  --timeline-dot: #e07a5f;
  --border: #2a2a48;
  --shadow: 0 2px 12px rgba(0,0,0,0.25);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --danger: #e74c3c;
  --danger-bg: #3a1a1a;
  --tag-bg: #2a2a48;
  --tag-text: #c09878;
  --modal-overlay: rgba(0,0,0,0.6);
  --input-bg: #1a1a2e;
  --input-border: #3a3050;
  --input-focus: #e07a5f;
  --placeholder: #605848;
  --badge: #e07a5f;
  --badge-text: #fff;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}

.app {
  max-width: 720px;
  margin: 0 auto;
  padding: 16px 16px 80px;
}

/* ===== Header ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--accent);
}

.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.btn-icon {
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: var(--card);
  color: var(--text2);
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.btn-icon:active {
  transform: scale(0.94);
  background: var(--card-hover);
}

/* ===== Toolbar ===== */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 14px 0;
  flex-wrap: wrap;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--card);
  color: var(--text);
  font-size: 0.875rem;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow);
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); background: var(--card-hover); }
.btn.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn.primary:active { background: var(--accent2); }
.btn.danger {
  background: var(--danger);
  color: #fff;
  border-color: var(--danger);
}

/* ===== Install Banner ===== */
.install-banner {
  display: none;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  margin-bottom: 12px;
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  font-size: 0.875rem;
  gap: 10px;
}
.install-banner.show { display: flex; }
.install-banner button {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.8rem;
  font-family: inherit;
  white-space: nowrap;
}

/* ===== Timeline ===== */
.timeline {
  position: relative;
  padding-left: 36px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 11px;
  top: 8px;
  bottom: 8px;
  width: 2px;
  background: var(--timeline);
  border-radius: 1px;
}

/* ===== Stage Card ===== */
.stage {
  position: relative;
  margin-bottom: 12px;
}

.stage-dot {
  position: absolute;
  left: -29px;
  top: 18px;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--timeline-dot);
  border: 3px solid var(--bg);
  z-index: 1;
  transition: transform 0.3s, box-shadow 0.3s;
}

.stage.open .stage-dot {
  transform: scale(1.3);
  box-shadow: 0 0 0 6px var(--accent-light);
}

.stage-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--card);
  border-radius: 12px;
  cursor: pointer;
  box-shadow: var(--shadow);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.2s;
  border: 1px solid var(--border);
}
.stage-header:active { background: var(--card-hover); }

.stage-icon {
  font-size: 1.6rem;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg2);
  border-radius: 10px;
  flex-shrink: 0;
}

.stage-info { flex: 1; min-width: 0; }

.stage-name {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
}

.stage-subtitle {
  font-size: 0.78rem;
  color: var(--text2);
  margin-top: 1px;
}

.stage-badge {
  font-size: 0.72rem;
  background: var(--badge);
  color: var(--badge-text);
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 600;
  flex-shrink: 0;
}

.stage-arrow {
  font-size: 0.7rem;
  color: var(--text3);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.stage.open .stage-arrow { transform: rotate(180deg); }

/* ===== Stage Body ===== */
.stage-body {
  display: none;
  padding: 4px 0 0;
}
.stage.open .stage-body { display: block; }

/* ===== Entry Card ===== */
.entry {
  background: var(--card);
  border-radius: 12px;
  margin-top: 8px;
  padding: 14px 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  position: relative;
}

.entry-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}

.entry-date {
  font-size: 0.8rem;
  color: var(--accent);
  font-weight: 600;
}

.entry-location {
  font-size: 0.78rem;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 3px;
}

.entry-actions {
  display: flex;
  gap: 4px;
  margin-left: auto;
}

.entry-actions button {
  width: 30px;
  height: 30px;
  border: none;
  border-radius: 8px;
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.entry-actions button:active { background: var(--border); }
.entry-actions button.del:active { background: var(--danger-bg); color: var(--danger); }

.entry-desc {
  font-size: 0.875rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 10px;
  white-space: pre-wrap;
  word-break: break-word;
}

.entry-people {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 8px;
}

.person-tag {
  font-size: 0.72rem;
  background: var(--tag-bg);
  color: var(--tag-text);
  padding: 2px 10px;
  border-radius: 10px;
}

.entry-photos {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

.entry-photos img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  border: 2px solid var(--border);
  transition: transform 0.2s;
}
.entry-photos img:active { transform: scale(1.05); }

/* ===== Dual Perspective ===== */
.perspectives {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 8px;
}

.perspective {
  background: var(--bg2);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.8rem;
  line-height: 1.6;
}

.perspective-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}

.perspective-content {
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}

/* ===== No entries ===== */
.no-entries {
  text-align: center;
  padding: 20px 16px;
  color: var(--text3);
  font-size: 0.85rem;
}

.no-entries .ico {
  font-size: 2rem;
  display: block;
  margin-bottom: 6px;
  opacity: 0.5;
}

/* ===== Modal ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.show {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal {
  background: var(--card);
  border-radius: 16px;
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  max-height: 90dvh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  animation: modalIn 0.25s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.modal-header h2 {
  font-size: 1.1rem;
  font-weight: 700;
}

.modal-close {
  width: 32px; height: 32px;
  border: none; border-radius: 50%;
  background: var(--bg2);
  color: var(--text2);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px 18px;
  -webkit-overflow-scrolling: touch;
}

.modal-footer {
  display: flex;
  gap: 10px;
  padding: 14px 18px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-footer .btn { flex: 1; justify-content: center; }

/* ===== Form ===== */
.form-group {
  margin-bottom: 14px;
}

.form-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 4px;
}

.form-input,
.form-textarea,
.form-select {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--input-border);
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.form-input:focus,
.form-textarea:focus,
.form-select:focus {
  outline: none;
  border-color: var(--input-focus);
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
  line-height: 1.6;
}

.form-input::placeholder,
.form-textarea::placeholder {
  color: var(--placeholder);
}

/* Photo picker */
.photo-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}

.photo-thumb {
  position: relative;
  width: 64px;
  height: 64px;
  border-radius: 8px;
  overflow: hidden;
  border: 2px solid var(--border);
}

.photo-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-thumb .remove-photo {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  border: none;
  font-size: 0.6rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.add-photo-btn {
  width: 64px;
  height: 64px;
  border: 2px dashed var(--input-border);
  border-radius: 8px;
  background: var(--input-bg);
  color: var(--text3);
  font-size: 1.5rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}

/* ===== Photo Viewer ===== */
.photo-viewer {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 300;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.photo-viewer.show { display: flex; }

.photo-viewer img {
  max-width: 95vw;
  max-height: 90vh;
  max-height: 90dvh;
  object-fit: contain;
  border-radius: 4px;
}

/* ===== Toast ===== */
.toast-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: #333;
  color: #fff;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 0.85rem;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards;
  text-align: center;
  max-width: 320px;
  pointer-events: auto;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; transform: translateY(-10px); }
}

/* ===== Footer ===== */
.footer {
  text-align: center;
  padding: 20px 0;
  font-size: 0.72rem;
  color: var(--text3);
  border-top: 1px solid var(--border);
  margin-top: 20px;
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .app { padding: 12px 12px 80px; }
  .header h1 { font-size: 1.3rem; }
  .toolbar { gap: 6px; }
  .btn { padding: 8px 12px; font-size: 0.8rem; }
  .perspectives { grid-template-columns: 1fr; }
  .entry-photos img { width: 64px; height: 64px; }
  .modal { border-radius: 16px 16px 0 0; max-height: 95vh; max-height: 95dvh; }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(100%); }
    to { opacity: 1; transform: translateY(0); }
  }
}

@media (min-width: 481px) and (max-width: 720px) {
  .app { padding: 16px 20px 80px; }
}

@media (min-width: 721px) {
  .app { padding: 20px 0 80px; }
}

@media (hover: hover) {
  .btn-icon:hover { background: var(--card-hover); }
  .btn:hover { background: var(--card-hover); }
  .btn.primary:hover { background: var(--accent2); }
  .stage-header:hover { background: var(--card-hover); }
}

@media print {
  .toolbar, .header-actions, .install-banner, .modal-overlay, .photo-viewer, .toast-container { display: none !important; }
  .stage-body { display: block !important; }
  .stage-dot { box-shadow: none !important; }
  body { background: #fff; color: #000; }
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== Stage add button ===== */
.stage-add {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border: 1px dashed var(--input-border);
  border-radius: 10px;
  background: transparent;
  color: var(--text3);
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.stage-add:active { background: var(--bg2); color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <h1>🌱 Life日志</h1>
    <div class="header-actions">
      <button class="btn-icon" id="btnTheme" title="切换深色模式" aria-label="切换深色模式">🌙</button>
    </div>
  </header>

  <!-- Install Banner -->
  <div class="install-banner" id="installBanner">
    <span>📲 添加到手机桌面，随时记录</span>
    <button id="btnInstall">安装</button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn" id="btnFolder">📁 选择存储位置</button>
    <button class="btn" id="btnExport">📤 导出备份</button>
    <button class="btn" id="btnImport">📥 导入备份</button>
    <button class="btn primary" id="btnGlobalAdd">✏️ 添加记录</button>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- Footer -->
  <div class="footer">
    Life日志 v2.0 &nbsp;|&nbsp; <span id="storageInfo">存储: 计算中...</span> &nbsp;|&nbsp; 定期导出备份
  </div>
</div>

<!-- ===== Entry Editor Modal ===== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 id="modalTitle">添加记录</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">所属阶段</label>
        <select class="form-select" id="entryStage"></select>
      </div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input type="date" class="form-input" id="entryDate">
      </div>
      <div class="form-group">
        <label class="form-label">地点</label>
        <input type="text" class="form-input" id="entryLocation" placeholder="例如：北京市、家中...">
      </div>
      <div class="form-group">
        <label class="form-label">文字描述</label>
        <textarea class="form-textarea" id="entryDesc" placeholder="记录这一刻..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">照片</label>
        <div class="photo-picker" id="photoPicker"></div>
        <input type="file" id="photoInput" accept="image/*" multiple style="display:none">
      </div>
      <div class="form-group">
        <label class="form-label">相关人物</label>
        <input type="text" class="form-input" id="entryPeople" placeholder="例如：母亲, 父亲, 小明（逗号分隔）">
      </div>
      <div class="form-group">
        <label class="form-label">👀 当时视角</label>
        <textarea class="form-textarea" id="entryThen" placeholder="当时的你，是怎么想的..." rows="2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">🔍 现在回看</label>
        <textarea class="form-textarea" id="entryNow" placeholder="现在回头看，有什么不同感受..." rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn danger" id="btnDeleteEntry" style="display:none">🗑 删除</button>
      <button class="btn" id="btnCancel">取消</button>
      <button class="btn primary" id="btnSave">💾 保存</button>
    </div>

<script>
// ============================================================
// DATA LAYER — IDB + optional local folder storage (D: drive)
// ============================================================
const LEGACY_KEY = 'life-record-data';
const DB_NAME = 'life-record-db';
const DB_VERSION = 2;
const STATE_STORE = 'state';
const HANDLE_STORE = 'handles';
const DATA_FILE = 'life-record-data.json';

const STAGE_DEFS = [
  { id: 'infancy',           name: '婴儿期', subtitle: '出生 — 学走路',       icon: '👶' },
  { id: 'childhood',         name: '童年',   subtitle: '学走路 — 小学',       icon: '🧒' },
  { id: 'later-childhood',   name: '少年期', subtitle: '小学 — 初中',         icon: '👦' },
  { id: 'adolescence',       name: '青春期', subtitle: '初中 — 高中',         icon: '🧑' },
  { id: 'young-adult',       name: '青年期', subtitle: '高中 — 大学/步入社会', icon: '👨‍🎓' },
  { id: 'prime',             name: '壮年期', subtitle: '大学/工作 — 中年',     icon: '💼' },
  { id: 'middle-age',        name: '中年期', subtitle: '中年 — 退休',         icon: '🏠' },
  { id: 'senior',            name: '老年期', subtitle: '退休 — 现在',         icon: '👴' },
  { id: 'death',             name: '终点',   subtitle: '尚未到来',           icon: '🕊️' },
];

function getDefaultData() {
  const stages = {};
  STAGE_DEFS.forEach(s => { stages[s.id] = { entries: [] }; });
  return { version: 2, stages };
}

// IndexedDB connection
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      if (!req.result.objectStoreNames.contains(STATE_STORE)) {
        req.result.createObjectStore(STATE_STORE);
      }
      if (!req.result.objectStoreNames.contains(HANDLE_STORE)) {
        req.result.createObjectStore(HANDLE_STORE);
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ============================================================
// FOLDER STORAGE — File System Access API (Chrome/Edge)
// ============================================================
let dirHandle = null; // FileSystemDirectoryHandle
let folderPath = '';  // display name

async function saveDirHandle(handle) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(HANDLE_STORE, 'readwrite');
      tx.objectStore(HANDLE_STORE).put(handle, 'dir');
      tx.oncomplete = () => resolve();
      tx.onerror = () => resolve();
    });
  } catch {}
}

async function loadDirHandle() {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(HANDLE_STORE, 'readonly');
      const req = tx.objectStore(HANDLE_STORE).get('dir');
      req.onsuccess = async () => {
        if (!req.result) { resolve(null); return; }
        try {
          const ok = await verifyPermission(req.result);
          resolve(ok ? req.result : null);
        } catch { resolve(null); }
      };
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function verifyPermission(handle) {
  try {
    const opts = { mode: 'readwrite' };
    const perm = await handle.queryPermission(opts);
    if (perm === 'granted') return true;
    const asked = await handle.requestPermission(opts);
    return asked === 'granted';
  } catch { return false; }
}

async function pickStorageFolder() {
  if (!('showDirectoryPicker' in window)) {
    toast('当前浏览器不支持本地文件夹存储，请使用 Chrome 或 Edge');
    return false;
  }
  try {
    const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
    // Verify writable
    const test = await handle.getFileHandle('.test', { create: true });
    await (await test.createWritable()).write('1');
    await handle.removeEntry('.test');

    dirHandle = handle;
    folderPath = handle.name;
    await saveDirHandle(handle);

    // Migrate existing IDB data to folder
    if (appData) { await saveDataToFolder(appData); }

    updateStorageInfo();
    updateFolderUI();
    toast('存储位置已设置：' + handle.name);
    return true;
  } catch (e) {
    if (e.name !== 'AbortError') toast('无法访问文件夹：' + e.message);
    return false;
  }
}

async function resetToBrowserStorage() {
  dirHandle = null;
  folderPath = '';
  try {
    const db = await openDB();
    const tx = db.transaction(HANDLE_STORE, 'readwrite');
    tx.objectStore(HANDLE_STORE).delete('dir');
  } catch {}
  updateStorageInfo();
  updateFolderUI();
  toast('已切换回浏览器存储');
}

// ============================================================
// LOAD — with folder priority
// ============================================================
async function loadData() {
  dirHandle = await loadDirHandle();
  if (dirHandle) {
    folderPath = dirHandle.name;
    try {
      const fh = await dirHandle.getFileHandle(DATA_FILE);
      const file = await fh.getFile();
      const data = JSON.parse(await file.text());
      const defaults = getDefaultData();
      for (const key of Object.keys(defaults.stages)) {
        if (!data.stages[key]) data.stages[key] = { entries: [] };
      }
      return data;
    } catch {
      // Folder is empty, fall through
    }
  }

  // IDB mode
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STATE_STORE, 'readonly');
      const req = tx.objectStore(STATE_STORE).get('appData');
      req.onsuccess = () => {
        if (req.result) {
          const data = req.result;
          const defaults = getDefaultData();
          for (const key of Object.keys(defaults.stages)) {
            if (!data.stages[key]) data.stages[key] = { entries: [] };
          }
          resolve(data);
        } else {
          resolve(migrateFromLegacy());
        }
      };
      req.onerror = () => resolve(migrateFromLegacy());
    });
  } catch {
    return migrateFromLegacy();
  }
}

function migrateFromLegacy() {
  try {
    const raw = localStorage.getItem(LEGACY_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      localStorage.removeItem(LEGACY_KEY);
      saveData(data);
      return data;
    }
  } catch {}
  return getDefaultData();
}

// ============================================================
// SAVE — folder-first, IDB fallback
// ============================================================
async function saveData(data) {
  if (dirHandle) {
    const ok = await saveDataToFolder(data);
    if (ok) {
      saveDataToIDB(data); // background backup
      updateStorageInfo();
      return true;
    }
    // Folder save failed, fall through to IDB
  }
  return saveDataToIDB(data);
}

async function saveDataToFolder(data) {
  try {
    const fh = await dirHandle.getFileHandle(DATA_FILE, { create: true });
    const writable = await fh.createWritable();
    await writable.write(JSON.stringify(data));
    await writable.close();
    return true;
  } catch (e) {
    toast('写入文件夹失败：' + e.message + '，已回退到浏览器存储');
    dirHandle = null;
    folderPath = '';
    updateFolderUI();
    return false;
  }
}

async function saveDataToIDB(data) {
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STATE_STORE, 'readwrite');
      tx.objectStore(STATE_STORE).put(data, 'appData');
      tx.oncomplete = () => { updateStorageInfo(); resolve(true); };
      tx.onerror = () => {
        toast('保存失败，请尝试导出备份');
        resolve(false);
      };
    });
  } catch (e) {
    toast('保存失败：' + e.message);
    return false;
  }
}

// ============================================================
// STORAGE INFO
// ============================================================
async function getStorageInfo() {
  if (dirHandle) {
    try {
      const fh = await dirHandle.getFileHandle(DATA_FILE);
      const file = await fh.getFile();
      return { usage: file.size, quota: 0, mode: 'folder', folder: folderPath };
    } catch {
      return { usage: 0, quota: 0, mode: 'folder', folder: folderPath };
    }
  }
  try {
    if ('storage' in navigator && 'estimate' in navigator.storage) {
      const est = await navigator.storage.estimate();
      return { usage: est.usage, quota: est.quota, mode: 'browser' };
    }
  } catch {}
  try {
    const db = await openDB();
    return new Promise((resolve) => {
      const tx = db.transaction(STATE_STORE, 'readonly');
      const req = tx.objectStore(STATE_STORE).get('appData');
      req.onsuccess = () => {
        const json = req.result ? JSON.stringify(req.result) : '';
        resolve({ usage: json.length * 2, quota: 0, mode: 'browser' });
      };
      req.onerror = () => resolve({ usage: 0, quota: 0, mode: 'browser' });
    });
  } catch {
    return { usage: 0, quota: 0, mode: 'browser' };
  }
}

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '0 KB';
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function updateStorageInfo() {
  const el = document.getElementById('storageInfo');
  if (!el) return;
  const info = await getStorageInfo();
  if (info.mode === 'folder') {
    el.textContent = '本地: ' + info.folder + ' (' + formatSize(info.usage) + ')';
  } else if (info.quota > 0) {
    el.textContent = '浏览器: ' + formatSize(info.usage) + ' / ' + formatSize(info.quota);
  } else {
    el.textContent = '浏览器: ' + formatSize(info.usage);
  }
}

function updateFolderUI() {
  const btn = document.getElementById('btnFolder');
  if (!btn) return;
  if (dirHandle) {
    btn.textContent = '\u{1F4C1} 存储: ' + folderPath;
    btn.classList.add('primary');
  } else {
    btn.textContent = '\u{1F4C1} 选择存储位置';
    btn.classList.remove('primary');
  }
}

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substring(2, 8);
}

// ============================================================
// STATE
// ============================================================
let appData = null;
let editingEntry = null; // { stageId, entryId } or null
let pendingPhotos = []; // base64 strings during editing
let deferredPrompt = null;

// ============================================================
// DOM REFS
// ============================================================
const $timeline = document.getElementById('timeline');
const $modalOverlay = document.getElementById('modalOverlay');
const $modalTitle = document.getElementById('modalTitle');
const $entryStage = document.getElementById('entryStage');
const $entryDate = document.getElementById('entryDate');
const $entryLocation = document.getElementById('entryLocation');
const $entryDesc = document.getElementById('entryDesc');
const $entryPeople = document.getElementById('entryPeople');
const $entryThen = document.getElementById('entryThen');
const $entryNow = document.getElementById('entryNow');
const $photoPicker = document.getElementById('photoPicker');
const $photoInput = document.getElementById('photoInput');
const $btnDeleteEntry = document.getElementById('btnDeleteEntry');
const $photoViewer = document.getElementById('photoViewer');
const $photoViewerImg = document.getElementById('photoViewerImg');
const $toastContainer = document.getElementById('toastContainer');
const $importFileInput = document.getElementById('importFileInput');
const $installBanner = document.getElementById('installBanner');

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  $toastContainer.appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// ============================================================
// DARK MODE
// ============================================================
const $btnTheme = document.getElementById('btnTheme');

function getTheme() {
  const stored = localStorage.getItem('life-record-theme');
  if (stored) return stored;
  return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  $btnTheme.textContent = theme === 'dark' ? '☀️' : '🌙';
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('life-record-theme', next);
  applyTheme(next);
}

applyTheme(getTheme());
$btnTheme.addEventListener('click', toggleTheme);

// Listen for system changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
  if (!localStorage.getItem('life-record-theme')) {
    applyTheme(e.matches ? 'dark' : 'light');
  }
});

// ============================================================
// RENDER TIMELINE
// ============================================================
function renderAll() {
  $timeline.innerHTML = '';
  STAGE_DEFS.forEach(def => {
    const stageData = appData.stages[def.id];
    const entries = stageData ? stageData.entries : [];
    const isOpen = entries.length > 0 && def.id !== 'death'; // auto-open non-empty stages except death

    const $stage = document.createElement('div');
    $stage.className = 'stage' + (isOpen ? ' open' : '');
    $stage.dataset.stageId = def.id;

    $stage.innerHTML = `
      <div class="stage-dot"></div>
      <div class="stage-header" data-action="toggle">
        <div class="stage-icon">${def.icon}</div>
        <div class="stage-info">
          <div class="stage-name">${def.name}</div>
          <div class="stage-subtitle">${def.subtitle}</div>
        </div>
        <span class="stage-badge">${entries.length} 条</span>
        <span class="stage-arrow">▼</span>
      </div>
      <div class="stage-body">
        <div class="stage-entries">
          ${entries.length === 0 ? `<div class="no-entries"><span class="ico">📝</span>还没有记录</div>` : ''}
          ${entries.map((entry, idx) => renderEntry(entry, def.id, idx)).join('')}
        </div>
        <button class="stage-add" data-action="add" data-stage-id="${def.id}">+ 添加记录</button>
      </div>
    `;

    $timeline.appendChild($stage);
  });
}

function renderEntry(entry, stageId, idx) {
  const photosHtml = entry.photos && entry.photos.length > 0
    ? `<div class="entry-photos">${entry.photos.map((p, i) =>
        `<img src="${escapeHtml(p)}" alt="照片${i+1}" data-action="view-photo" data-photo-index="${i}" data-entry-id="${escapeHtml(entry.id)}" data-stage-id="${stageId}" loading="lazy">`
      ).join('')}</div>`
    : '';

  const peopleHtml = entry.relatedPeople
    ? `<div class="entry-people">${entry.relatedPeople.split(',').map(p =>
        `<span class="person-tag">${escapeHtml(p.trim())}</span>`
      ).join('')}</div>`
    : '';

  const perspectivesHtml = (entry.perspectiveThen || entry.perspectiveNow)
    ? `<div class="perspectives">
        <div class="perspective">
          <div class="perspective-label">👀 当时视角</div>
          <div class="perspective-content">${escapeHtml(entry.perspectiveThen || '—')}</div>
        </div>
        <div class="perspective">
          <div class="perspective-label">🔍 现在回看</div>
          <div class="perspective-content">${escapeHtml(entry.perspectiveNow || '—')}</div>
        </div>
      </div>`
    : '';

  return `
    <div class="entry" data-entry-id="${escapeHtml(entry.id)}" data-stage-id="${stageId}">
      <div class="entry-header">
        <span class="entry-date">${escapeHtml(entry.date || '日期未填')}</span>
        ${entry.location ? `<span class="entry-location">📍 ${escapeHtml(entry.location)}</span>` : ''}
        <div class="entry-actions">
          <button data-action="edit" data-entry-id="${escapeHtml(entry.id)}" data-stage-id="${stageId}">✎</button>
          <button class="del" data-action="delete" data-entry-id="${escapeHtml(entry.id)}" data-stage-id="${stageId}">✕</button>
        </div>
      </div>
      ${entry.description ? `<div class="entry-desc">${escapeHtml(entry.description)}</div>` : ''}
      ${photosHtml}
      ${peopleHtml}
      ${perspectivesHtml}
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ============================================================
// STAGE TOGGLE & ACTIONS (Event Delegation)
// ============================================================
$timeline.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'toggle') {
    const stage = target.closest('.stage');
    stage.classList.toggle('open');
    return;
  }

  if (action === 'add') {
    const stageId = target.dataset.stageId;
    openEditor(stageId, null);
    return;
  }

  if (action === 'edit') {
    const stageId = target.dataset.stageId;
    const entryId = target.dataset.entryId;
    openEditor(stageId, entryId);
    return;
  }

  if (action === 'delete') {
    const stageId = target.dataset.stageId;
    const entryId = target.dataset.entryId;
    deleteEntry(stageId, entryId);
    return;
  }

  if (action === 'view-photo') {
    const stageId = target.dataset.stageId;
    const entryId = target.dataset.entryId;
    const photoIndex = parseInt(target.dataset.photoIndex);
    viewPhoto(stageId, entryId, photoIndex);
    return;
  }
});

// ============================================================
// ENTRY EDITOR
// ============================================================
function populateStageSelect() {
  $entryStage.innerHTML = STAGE_DEFS.map(s =>
    `<option value="${s.id}">${s.icon} ${s.name} — ${s.subtitle}</option>`
  ).join('');
}

function openEditor(stageId, entryId) {
  editingEntry = entryId ? { stageId, entryId } : null;
  pendingPhotos = [];

  populateStageSelect();
  $entryStage.value = stageId;

  if (entryId) {
    const entry = appData.stages[stageId].entries.find(e => e.id === entryId);
    if (entry) {
      $modalTitle.textContent = '编辑记录';
      $entryDate.value = entry.date || '';
      $entryLocation.value = entry.location || '';
      $entryDesc.value = entry.description || '';
      $entryPeople.value = entry.relatedPeople || '';
      $entryThen.value = entry.perspectiveThen || '';
      $entryNow.value = entry.perspectiveNow || '';
      pendingPhotos = [...(entry.photos || [])];
      $btnDeleteEntry.style.display = '';
    }
  } else {
    $modalTitle.textContent = '添加记录';
    $entryDate.value = '';
    $entryLocation.value = '';
    $entryDesc.value = '';
    $entryPeople.value = '';
    $entryThen.value = '';
    $entryNow.value = '';
    pendingPhotos = [];
    $btnDeleteEntry.style.display = 'none';
  }

  renderPhotoPicker();
  $modalOverlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeEditor() {
  $modalOverlay.classList.remove('show');
  document.body.style.overflow = '';
  editingEntry = null;
  pendingPhotos = [];
}

function renderPhotoPicker() {
  $photoPicker.innerHTML = '';
  pendingPhotos.forEach((photo, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'photo-thumb';
    thumb.innerHTML = `
      <img src="${photo}" alt="照片${i+1}">
      <button class="remove-photo" data-photo-index="${i}">✕</button>
    `;
    thumb.querySelector('.remove-photo').addEventListener('click', (e) => {
      e.stopPropagation();
      pendingPhotos.splice(i, 1);
      renderPhotoPicker();
    });
    $photoPicker.appendChild(thumb);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'add-photo-btn';
  addBtn.textContent = '+';
  addBtn.type = 'button';
  addBtn.addEventListener('click', () => $photoInput.click());
  $photoPicker.appendChild(addBtn);
}

// ============================================================
// PHOTO COMPRESSION — reduce size by 90-95%
// ============================================================
function compressPhoto(file) {
  return new Promise((resolve) => {
    if (!file.type.startsWith('image/')) {
      // Not an image — store as-is (unlikely with accept="image/*")
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
      return;
    }
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      const maxDim = 1920;
      let w = img.width;
      let h = img.height;
      if (w > maxDim || h > maxDim) {
        const ratio = Math.min(maxDim / w, maxDim / h);
        w = Math.round(w * ratio);
        h = Math.round(h * ratio);
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        if (blob) {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(blob);
        } else {
          // Canvas toBlob fallback (e.g. Safari old versions)
          const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
          resolve(dataUrl);
        }
      }, 'image/jpeg', 0.75);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      // Fallback: store original
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    };
    img.src = url;
  });
}

$photoInput.addEventListener('change', async () => {
  const files = Array.from($photoInput.files);
  $photoInput.value = '';
  if (files.length === 0) return;

  toast('正在压缩照片...');

  const results = await Promise.all(files.map(f => compressPhoto(f).catch(() => null)));
  const valid = results.filter(r => r !== null);

  // Remove the "compressing" toast by letting it expire naturally
  if (valid.length < files.length) {
    toast(`${files.length - valid.length} 张照片处理失败，已跳过`);
  }

  pendingPhotos.push(...valid);
  renderPhotoPicker();

  // Show compression stats
  let origTotal = 0, compressedTotal = 0;
  files.forEach((f, i) => {
    if (results[i]) {
      origTotal += f.size;
      compressedTotal += Math.round(results[i].length * 0.75); // base64 → raw bytes estimate
    }
  });
  if (origTotal > 0 && compressedTotal > 0) {
    const saved = origTotal > compressedTotal ? `节省 ${formatSize(origTotal - compressedTotal)}` : '';
    if (saved) toast(`已压缩 ${files.length} 张照片，${saved}`);
  }
});

function getEditorData() {
  return {
    id: editingEntry ? editingEntry.entryId : generateId(),
    date: $entryDate.value,
    location: $entryLocation.value.trim(),
    description: $entryDesc.value.trim(),
    photos: [...pendingPhotos],
    relatedPeople: $entryPeople.value.trim(),
    perspectiveThen: $entryThen.value.trim(),
    perspectiveNow: $entryNow.value.trim(),
  };
}

async function saveEntry() {
  const entry = getEditorData();
  if (!entry.date && !entry.description && entry.photos.length === 0) {
    toast('请至少填写日期、描述或添加照片');
    return;
  }

  const stageId = $entryStage.value;

  if (editingEntry) {
    const oldStageId = editingEntry.stageId;
    if (oldStageId !== stageId) {
      appData.stages[oldStageId].entries = appData.stages[oldStageId].entries.filter(e => e.id !== editingEntry.entryId);
      appData.stages[stageId].entries.push(entry);
    } else {
      const idx = appData.stages[stageId].entries.findIndex(e => e.id === editingEntry.entryId);
      if (idx !== -1) appData.stages[stageId].entries[idx] = entry;
    }
  } else {
    appData.stages[stageId].entries.push(entry);
  }

  // Sort entries by date within each stage
  Object.values(appData.stages).forEach(s => {
    s.entries.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  });

  if (!(await saveData(appData))) return;

  closeEditor();
  renderAll();
  toast('已保存 ✓');
}

async function deleteEntry(stageId, entryId) {
  if (!confirm('确定要删除这条记录吗？此操作不可撤销。')) return;
  appData.stages[stageId].entries = appData.stages[stageId].entries.filter(e => e.id !== entryId);
  await saveData(appData);
  renderAll();
  toast('已删除');
}

function viewPhoto(stageId, entryId, photoIndex) {
  const entry = appData.stages[stageId].entries.find(e => e.id === entryId);
  if (!entry || !entry.photos[photoIndex]) return;
  $photoViewerImg.src = entry.photos[photoIndex];
  $photoViewer.classList.add('show');
  document.body.style.overflow = 'hidden';
}

});

// EXPORT / IMPORT
// ============================================================
document.getElementById('btnExport').addEventListener('click', () => {
  const json = JSON.stringify(appData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const filename = `Life日志备份-${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}.json`;
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
  toast('备份已导出 ✓');
});

document.getElementById('btnImport').addEventListener('click', () => {
  $importFileInput.click();
});

$importFileInput.addEventListener('change', () => {
  const file = $importFileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const imported = JSON.parse(reader.result);
      if (!imported.stages || typeof imported.stages !== 'object') {
        throw new Error('无效的数据格式');
      }
      if (!confirm(`即将导入备份数据（${file.name}），当前数据将被覆盖，确定继续？`)) return;
      const defaults = getDefaultData();
      for (const key of Object.keys(defaults.stages)) {
        if (!imported.stages[key]) imported.stages[key] = { entries: [] };
      }
      imported.version = imported.version || 1;
      appData = imported;
      await saveData(appData);
      renderAll();
      toast('数据已导入 ✓');
    } catch {
      toast('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
  $importFileInput.value = '';
});

// Global add button — ask which stage
document.getElementById('btnGlobalAdd').addEventListener('click', () => {
  // Find the most recent stage with entries, or default to first
  let defaultStage = 'infancy';
  for (let i = STAGE_DEFS.length - 1; i >= 0; i--) {
    const entries = appData.stages[STAGE_DEFS[i].id]?.entries || [];
    if (entries.length > 0) {
      defaultStage = STAGE_DEFS[i].id;
      break;
    }
  }
  openEditor(defaultStage, null);
});

// ============================================================
// PWA — Service Worker
// ============================================================
function registerSW() {
  if (!('serviceWorker' in navigator)) return;

  // Build SW from inline code (works when served over HTTPS)
  const swCode = `
const CACHE = 'life-record-v1';
const URLS = [self.location.href];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(URLS).catch(() => {}))
  );
  self.skipWaiting();
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys => Promise.all(
      keys.filter(k => k !== CACHE).map(k => caches.delete(k))
    ))
  );
  self.clients.claim();
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fetched = fetch(e.request).then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      }).catch(() => cached);
      return cached || fetched;
    })
  );
});
`;

  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);

  // Try to register the SW. Note: blob URLs may not work for SW in all browsers.
  // This is a best-effort approach; for full PWA support, save sw.js alongside the HTML.
  navigator.serviceWorker.register(swUrl, { scope: '/' }).then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(() => {
    // SW registration from blob URL is not supported — silent fallback.
    // To fully enable offline support, extract the sw.js content above
    // and save it as a separate sw.js file in the same directory.
    console.log('SW: blob registration not supported. Save sw.js separately for full offline support.');
  });
}

});

  appData = await loadData();
  registerSW();
  populateStageSelect();
  renderAll();
  updateStorageInfo();
  updateFolderUI();

  // Request persistent storage (less likely to be evicted by browser)

    if (persisted) {
      console.log('持久存储已授予 — 数据不会被浏览器自动清理');
    }
  }
}
